version: '3.8'

services:
  tinder-mcp:
    build: .
    container_name: tinder-mcp-server
    restart: unless-stopped
    environment:
      - HEADLESS=true
      - STABILITY_WAIT=5000
      - DEFAULT_TIMEOUT=30000
      - SAVE_SCREENSHOTS=false
      - DEBUG_MODE=false
    volumes:
      # Mount data directory for persistent cookies and sessions
      - ./data:/app/data:rw
      # Mount screenshots directory if needed
      - ./screenshots:/app/screenshots:rw
    # Uncomment if you need HTTP interface
    # ports:
    #   - "3000:3000"
    stdin_open: true
    tty: true
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('Health check passed')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for session storage (if implementing distributed sessions)
  # redis:
  #   image: redis:7-alpine
  #   container_name: tinder-mcp-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   command: redis-server --appendonly yes

# volumes:
#   redis_data:

networks:
  default:
    name: tinder-mcp-network
