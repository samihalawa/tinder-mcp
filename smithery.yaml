version: 1
startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties:
      tinderCookies:
        type: string
        description: "JSON string of Tinder session cookies from browser DevTools for instant authentication"
      tinderPhone:
        type: string
        description: "Phone number for Tinder login (optional, e.g., '680821181')"
      tinderCountryCode:
        type: string
        description: "Country code for phone login (e.g., '34' for Spain, '1' for US)"
        default: "1"
      tinderAppleEmail:
        type: string
        description: "Apple ID email for authentication (optional)"
      tinderApplePassword:
        type: string
        description: "Apple ID password for authentication (optional)"
      headless:
        type: boolean
        description: "Run browser in headless mode"
        default: true
      timeout:
        type: number
        description: "Default timeout in milliseconds"
        default: 30000
      debug:
        type: boolean
        description: "Enable debug logging"
        default: false
      autoLogin:
        type: boolean
        description: "Automatically login when server starts"
        default: false
      loginMethod:
        type: string
        description: "Preferred login method for auto-authentication"
        enum: ["cookies", "phone", "apple"]
        default: "cookies"
      swipeDelay:
        type: number
        description: "Default delay between swipes in milliseconds"
        default: 3000
        minimum: 1000
        maximum: 10000
  commandFunction: |-
    (config) => ({ 
      command: 'node', 
      args: ['dist/index.js'], 
      env: { 
        TINDER_COOKIES: config.tinderCookies || '',
        TINDER_PHONE: config.tinderPhone || '',
        TINDER_COUNTRY_CODE: config.tinderCountryCode || '1',
        TINDER_APPLE_EMAIL: config.tinderAppleEmail || '',
        TINDER_APPLE_PASSWORD: config.tinderApplePassword || '',
        HEADLESS: config.headless ? 'true' : 'false',
        TIMEOUT: config.timeout?.toString() || '30000',
        DEBUG: config.debug ? 'true' : 'false',
        AUTO_LOGIN: config.autoLogin ? 'true' : 'false',
        LOGIN_METHOD: config.loginMethod || 'cookies',
        SWIPE_DELAY: config.swipeDelay?.toString() || '3000'
      } 
    })
